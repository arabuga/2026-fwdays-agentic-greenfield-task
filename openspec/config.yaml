schema: spec-driven

context: |
  Project: Weather Explorer — Ukrainian-first weekend trip weather planner.
  Stack: Next.js 16 App Router, React 19, TypeScript strict, Tailwind CSS 4, shadcn/ui base-nova.
  Data: keyless Open-Meteo (forecast + geocoding), OSM tiles via Leaflet.
  Constraints: no accounts, no analytics, no cookies, geolocation opt-in only.
  Source of truth: docs/requirements.md (FR/NFR/TC/BC IDs), docs/product-brief.md (narrative), DESIGN.md (visual identity).
  lib/ is framework-free (TC-PURE-01). UI strings in lib/i18n/uk.ts.

